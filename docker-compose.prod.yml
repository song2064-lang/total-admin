# 운영 오버레이. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  app:
    restart: always

  web:
    restart: always

  db:
    restart: always

  worker:
    image: total-admin-app
    restart: always
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
      - ./docker/php/zz-app.ini:/usr/local/etc/php/conf.d/zz-app.ini:ro
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    image: total-admin-app
    restart: always
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
      - ./docker/php/zz-app.ini:/usr/local/etc/php/conf.d/zz-app.ini:ro
    depends_on:
      db:
        condition: service_healthy
